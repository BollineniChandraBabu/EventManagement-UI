<div class="chat-widget" [class.open]="isOpen">
  <button class="chat-launcher" type="button" (click)="toggle()" aria-label="Toggle messages">
    <span class="chat-icon-wrap">
      <i class="fa-regular fa-message"></i>
      <span class="chat-badge" *ngIf="unreadCount > 0">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
    </span>
    <span class="chat-launcher-title">Messages</span>
    <span class="chat-avatar"><i class="fa-solid fa-user"></i></span>
  </button>

  <section class="chat-panel" *ngIf="isOpen">
    <header class="chat-panel-header">
      <button type="button" class="mobile-back" *ngIf="mobileConversationView" (click)="closeConversation()">
        <i class="fa-solid fa-chevron-left"></i>
      </button>
      <div class="chat-title-wrap">
        <h2>Messages</h2>
        <small>Realtime chat</small>
      </div>
      <button type="button" class="chat-close" (click)="toggle()"><i class="fa-solid fa-xmark"></i></button>
    </header>

    <div class="chat-panel-body" [class.mobile-thread]="mobileConversationView">
      <aside class="chat-conversations" [class.hidden-mobile]="mobileConversationView">
        <div class="pane-header">Conversations</div>
        <div class="new-chat-box">
          <button type="button" class="btn btn-sm btn-primary" (click)="showNewChatPicker = !showNewChatPicker">
            <i class="fa-solid fa-plus me-1"></i>New chat
          </button>
          <div class="new-chat-picker" *ngIf="showNewChatPicker">
            <input type="text" class="form-control form-control-sm" [(ngModel)]="newChatSearch" placeholder="Search users">
            <div class="new-chat-list">
              <button type="button" *ngFor="let user of filteredNewChatUsers" (click)="startConversation(user)">
                <span>{{ user.name }}</span>
                <small [class.online]="user.online">{{ user.online ? 'Active now' : 'Last seen ' + (user.lastSeenAt ? (user.lastSeenAt | date: 'short') : 'recently') }}</small>
              </button>
              <p *ngIf="!filteredNewChatUsers.length">No users found.</p>
            </div>
          </div>
        </div>

        <button
          type="button"
          class="conversation-row"
          *ngFor="let convo of conversations"
          (click)="chooseConversation(convo)"
        >
          <div>
            <strong>
              <span class="presence-dot" [class.online]="convo.otherUserOnline"></span>
              {{ convo.otherUserName }}
            </strong>
            <p>{{ convo.lastMessage || 'Start chatting...' }}</p>
          </div>
          <span class="mini-badge" *ngIf="convo.unreadCount > 0">{{ convo.unreadCount }}</span>
        </button>
      </aside>

      <div class="chat-thread" *ngIf="activeConversation; else emptyState">
        <div class="thread-header">
          <div>
            <h3>{{ activeConversation.otherUserName }}</h3>
            <small>{{ getActiveConversationStatus() }}</small>
          </div>
        </div>

        <div class="chat-messages" #messageScroller>
          <div
            class="chat-message"
            *ngFor="let message of messages"
            [class.mine]="message.mine"
            (mouseenter)="hoveredMessageId = message.messageId"
            (mouseleave)="hoveredMessageId = null"
          >
            <div class="message-body">
              <ng-container *ngIf="editingMessageId !== message.messageId; else editBox">
                <p *ngIf="message.messageText">{{ message.messageText }}</p>
              </ng-container>
              <ng-template #editBox>
                <div class="edit-shell">
                  <textarea rows="2" [(ngModel)]="editDraft"></textarea>
                  <div class="edit-actions">
                    <button type="button" class="btn btn-sm btn-light" (click)="cancelEdit()">Cancel</button>
                    <button type="button" class="btn btn-sm btn-primary" (click)="saveEdit(message)">Save</button>
                  </div>
                </div>
              </ng-template>

              <button
                class="attachment-chip"
                type="button"
                *ngIf="message.attachmentFileName"
                (click)="downloadAttachment(message)"
              >
                <i class="fa-solid fa-paperclip"></i>
                {{ message.attachmentFileName }}
              </button>

              <small>{{ message.sentAt | date: 'shortTime' }}</small>
            </div>

            <div
              class="message-actions"
              *ngIf="hoveredMessageId === message.messageId && editingMessageId !== message.messageId && message.mine"
            >
              <button
                type="button"
                class="action-btn"
                *ngIf="canEdit(message)"
                (click)="startEdit(message)"
                title="Edit"
              >
                <i class="fa-solid fa-pen"></i>
              </button>
              <button
                type="button"
                class="action-btn danger"
                *ngIf="canDelete(message)"
                (click)="deleteLatestIfEligible(message)"
                title="Delete"
              >
                <i class="fa-solid fa-trash"></i>
              </button>
            </div>
          </div>
        </div>

        <div class="chat-composer-shell">
          <input #attachmentInput type="file" hidden (change)="onAttachmentSelected($event)">

          <div class="selected-file-pill" *ngIf="selectedAttachment">
            <i class="fa-solid fa-file-lines"></i>
            <span>{{ selectedAttachment.name }}</span>
            <button type="button" (click)="clearAttachment()"><i class="fa-solid fa-xmark"></i></button>
          </div>

          <div class="chat-composer">
            <button type="button" class="attach-btn" (click)="triggerAttachment()" title="Attach file">
              <i class="fa-solid fa-paperclip"></i>
            </button>
            <textarea
              [(ngModel)]="composer"
              rows="1"
              placeholder="Type a message..."
              (keydown.enter)="$event.preventDefault(); send()"
              (input)="onComposerInput()"
            ></textarea>
            <button type="button" (click)="send()" [disabled]="!canSend"><i class="fa-solid fa-paper-plane"></i></button>
          </div>
        </div>
      </div>

      <ng-template #emptyState>
        <div class="chat-empty">Pick a conversation to start chatting in real time.</div>
      </ng-template>
    </div>
  </section>
</div>
