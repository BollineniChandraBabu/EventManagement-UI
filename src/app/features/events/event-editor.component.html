<div class="page">
  <section class="panel event-editor-panel">
    <div class="d-flex justify-content-between align-items-center mb-4 gap-2 flex-wrap">
      <div>
        <h2 class="page-title mb-1">{{ pageTitle }}</h2>
        <p class="text-muted mb-0">Create personalized events with cleaner inputs and faster admin workflows.</p>
      </div>
      <a class="btn btn-outline-secondary" routerLink="/events">Back to Events</a>
    </div>

    <div *ngIf="loading" class="text-muted py-3">Loading event data...</div>

    <ng-container *ngIf="!loading">
      <form [formGroup]="form" class="form-grid card card-body border-0 bg-light-subtle">
        <div>
          <label class="form-label">User <span class="text-danger">*</span></label>
          <select class="form-select" formControlName="userId" [disabled]="!isAdmin()">
            <option [ngValue]="0" disabled>Select a user</option>
            <option *ngFor="let user of allUsers" [ngValue]="user.id">{{ user.name }} ({{ user.email }})</option>
          </select>
        </div>

        <div>
          <label class="form-label">Type <span class="text-danger">*</span></label>
          <select class="form-select" formControlName="type" [disabled]="!isAdmin()">
            <option *ngFor="let type of types" [value]="type">{{ type }}</option>
          </select>
        </div>

        <div *ngIf="form.controls.type.value === 'Festival'">
          <label class="form-label">Festival Name</label>
          <input class="form-control" formControlName="festival" [readonly]="!isAdmin()" placeholder="Enter festival name" />
        </div>

        <div>
          <label class="form-label">Date</label>
          <input class="form-control" type="date" formControlName="eventDate" [readonly]="!isAdmin()" />
          <small class="text-muted">Optional for recurring/event-type driven reminders.</small>
        </div>

        <div class="d-flex align-items-end">
          <div class="form-check form-switch mt-3">
            <input class="form-check-input" type="checkbox" id="recurringSwitch" formControlName="recurring" [disabled]="!isAdmin()" />
            <label class="form-check-label" for="recurringSwitch">Recurring Event</label>
          </div>
        </div>
      </form>

      <div class="d-flex flex-wrap gap-2 mt-4" *ngIf="isAdmin()">
        <button class="btn btn-primary" type="button" (click)="save()" [disabled]="saving">{{ submitLabel }}</button>
        <a class="btn btn-outline-secondary" routerLink="/events">Cancel</a>
      </div>

      <div class="alert alert-info mt-3" *ngIf="!isAdmin()">Read-only access: only admins can create or update events.</div>
    </ng-container>
  </section>
</div>
